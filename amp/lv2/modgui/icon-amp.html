<style>
  .amp-icon{
    --w: 230px;
    --h: 431px;

    /* KNOB (ajusta si hace falta) */
    --knob-size: 96px;
    --knob-x: 68px;
    --knob-y: 30px;

    /* JACKS */
    --in-x: -85px;
    --out-x: 225px;
    --inL-y: 190px;
    --inR-y: 250px;
    --outL-y: 190px;
    --outR-y: 250px;

    /* FOOTSWITCH + LED */
    --sw-size: 52px;
    --sw-x: 85px;
    --sw-y: 310px;

    --led-size: 12px;
    --led-x: 105px;
    --led-y: 295px;

    width: var(--w);
    height: var(--h);
    position: relative;
    box-sizing: border-box;

    background-image: url(/resources/panel.png{{{ns}}});
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* KNOB */
  .amp-knob{
    position:absolute;
    left: var(--knob-x);
    top:  var(--knob-y);
    width: var(--knob-size);
    height: var(--knob-size);
    z-index:30;

    background-image: url(/resources/knobs/boxy/black.png{{{ns}}});
    background-repeat: no-repeat;
    background-position: 0 0;
    background-size: auto var(--knob-size);
  }

  /* JACKS (host styles) */
  .amp-inL.mod-input, .amp-inR.mod-input,
  .amp-outL.mod-output, .amp-outR.mod-output{
    position:absolute !important;
    z-index:40 !important;
    left:auto !important;
    right:auto !important;
    top:auto !important;
    bottom:auto !important;
  }

  .amp-inL.mod-input  { left: var(--in-x)  !important; top: var(--inL-y)  !important; }
  .amp-inR.mod-input  { left: var(--in-x)  !important; top: var(--inR-y)  !important; }
  .amp-outL.mod-output{ left: var(--out-x) !important; top: var(--outL-y) !important; }
  .amp-outR.mod-output{ left: var(--out-x) !important; top: var(--outR-y) !important; }

  /* Footswitch sprite (solo visual) */
  .amp-footswitch-img{
    position:absolute;
    left: var(--sw-x);
    top:  var(--sw-y);
    width: var(--sw-size);
    height: var(--sw-size);
    z-index:25;

    background-image: url(/resources/pedals/footswitch.png{{{ns}}});
    background-repeat: no-repeat;
    background-size: auto var(--sw-size);

    /* por defecto OFF: segundo frame */
    background-position: calc(-1 * var(--sw-size)) 0;
    pointer-events:none;
  }

  /* Click area del host bypass */
  .amp-footswitch-hit[mod-role="bypass"]{
    position:absolute;
    left: var(--sw-x);
    top:  var(--sw-y);
    width: var(--sw-size);
    height: var(--sw-size);
    z-index:50;
    cursor:pointer;
    background: transparent;
  }

  /* LED ligado al host bypass */
  .amp-led[mod-role="bypass-light"]{
    position:absolute;
    left: var(--led-x);
    top:  var(--led-y);
    width: var(--led-size);
    height: var(--led-size);
    z-index:55;
    border-radius:50%;
    background: rgba(255,0,0,0.85); /* o quítalo si ya tienes LED en la skin */
  }

  /* Si MOD aplica .on/.off */
  .amp-led.on  { opacity: 1; }
  .amp-led.off { opacity: 0.2; }

</style>

<div class="amp-icon">
  <div class="mod-drag-handle" mod-role="drag-handle"></div>

  <!-- Gain -->
  <div class="amp-knob" mod-role="input-control-port" mod-port-symbol="gain" mod-widget="film"></div>

  <!-- Audio ports -->
  <div class="mod-input  mod-input-disconnected  amp-inL"   mod-role="input-audio-port"  mod-port-symbol="in_l"></div>
  <div class="mod-input  mod-input-disconnected  amp-inR"   mod-role="input-audio-port"  mod-port-symbol="in_r"></div>
  <div class="mod-output mod-output-disconnected amp-outL"  mod-role="output-audio-port" mod-port-symbol="out_l"></div>
  <div class="mod-output mod-output-disconnected amp-outR"  mod-role="output-audio-port" mod-port-symbol="out_r"></div>

  <!-- Host bypass -->
  <div class="amp-footswitch-img"></div>

  <!-- Host bypass (clickable) + LED -->
  <div class="amp-footswitch-hit" mod-role="bypass"></div>
  <div class="amp-led" mod-role="bypass-light"></div>

</div>
